<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freight Rate Settings</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Freight Rate Settings</h1>

    <div>
        <form id="freight_rates">

            <label>Country: <select id="freight_country" name="freight_country">
                    <option value="">-- Please choose --</option>
                </select></label>
            <button type="button" onclick="loadCountryByName()">Load Country</button>

            <label>Country name: <input type="text" id="freight_country_name"></label>

            <button type="submit">Save Country Rates</button>
            <button type="reset">Reset</button>


            <button type="button" id="addFreightRow">Add New Line</button>
            <div class="freight_grid">
                <div class="freight-row">
                <div>Min (cuft)
                    <div>
                        <label>Minimum $: <input type="number" step="0.01" id="freight_minimum"
                                name="freight_minimum"></label>
                    </div>
                </div>
                <div>Max (cuft)</div>

                <div>Freight Rate</div>
                <div>Freight Rate Type</div>

                <div>Additional $ / Markup multiplier</div>
                <div>Markup Type</div>
                </div>

                <div class="freight-row" data-index="1">
                    <!-- range 1 -->
                    <input type="number" step="0.01" id="freight_min1" name="freight_min1">
                    <input type="number" step="0.01" id="freight_max1" name="freight_max1">

                    <input type="number" step="0.01" id="freight_rate1" name="freight_rate1">
                    <div>
                        <input type="radio" id="freight_rate_type_1" name="freight_rate_type_1" value="variable">
                        <label for="freight_rate_type_v_1">Variable</label>
                        <input type="radio" id="freight_rate_type_f_1" name="freight_rate_type_1" value="flat">
                        <label for="freight_rate_type_f_1">Flat</label>
                    </div>

                    <input type="number" step="0.01" id="freight_markup_rate1" name="freight_markup_rate1">
                    <div>
                        <input type="radio" id="freight_markup_rate_type_v_1" name="freight_markup_rate_type_1"
                            value="variable">
                        <label for="freight_markup_rate_type_v_1">Multip.</label>
                        <input type="radio" id="freight_markup_rate_type_f_1" name="freight_markup_rate_type_1"
                            value="flat">
                        <label for="freight_markup_rate_type_f_1">Flat</label>
                    </div>
                </div>

                <div class="freight-row" data-index="2">
                    <!-- range 2 -->
                    <input type="number" step="0.01" id="freight_min2" name="freight_min2">
                    <input type="number" step="0.01" id="freight_max2" name="freight_max2">

                    <input type="number" step="0.01" id="freight_rate2" name="freight_rate2">
                    <div>
                        <input type="radio" id="freight_rate_type_2" name="freight_rate_type_2" value="variable">
                        <label for="freight_rate_type_v_2">Variable</label>
                        <input type="radio" id="freight_rate_type_f_2" name="freight_rate_type_2" value="flat">
                        <label for="freight_rate_type_f_2">Flat</label>
                    </div>

                    <input type="number" step="0.01" id="freight_markup_rate2" name="freight_markup_rate2">
                    <div>
                        <input type="radio" id="freight_markup_rate_type_v_2" name="freight_markup_rate_type_2"
                            value="variable">
                        <label for="freight_markup_rate_type_v_2">Multip.</label>
                        <input type="radio" id="freight_markup_rate_type_f_2" name="freight_markup_rate_type_2"
                            value="flat">
                        <label for="freight_markup_rate_type_f_2">Flat</label>
                    </div>
                </div>

                <div class="freight-row" data-index="3">
                    <!-- range 3 -->
                    <input type="number" step="0.01" id="freight_min3" name="freight_min3">
                    <input type="number" step="0.01" id="freight_max3" name="freight_max3">

                    <input type="number" step="0.01" id="freight_rate3" name="freight_rate3">
                    <div>
                        <input type="radio" id="freight_rate_type_3" name="freight_rate_type_3" value="variable">
                        <label for="freight_rate_type_v_3">Variable</label>
                        <input type="radio" id="freight_rate_type_f_3" name="freight_rate_type_3" value="flat">
                        <label for="freight_rate_type_f_3">Flat</label>
                    </div>

                    <input type="number" step="0.01" id="freight_markup_rate3" name="freight_markup_rate3">
                    <div>
                        <input type="radio" id="freight_markup_rate_type_v_3" name="freight_markup_rate_type_3"
                            value="variable">
                        <label for="freight_markup_rate_type_v_3">Multip.</label>
                        <input type="radio" id="freight_markup_rate_type_f_3" name="freight_markup_rate_type_3"
                            value="flat">
                        <label for="freight_markup_rate_type_f_3">Flat</label>
                    </div>
                </div>

                <div class="freight-row" data-index="4">
                    <!-- range 4 -->
                    <input type="number" step="0.01" id="freight_min4" name="freight_min4">
                    <input type="number" step="0.01" id="freight_max4" name="freight_max4">

                    <input type="number" step="0.01" id="freight_rate4" name="freight_rate4">
                    <div>
                        <input type="radio" id="freight_rate_type_4" name="freight_rate_type_4" value="variable">
                        <label for="freight_rate_type_v_4">Variable</label>
                        <input type="radio" id="freight_rate_type_f_4" name="freight_rate_type_4" value="flat">
                        <label for="freight_rate_type_f_4">Flat</label>
                    </div>


                    <input type="number" step="0.01" id="freight_markup_rate4" name="freight_markup_rate4">
                    <div>
                        <input type="radio" id="freight_markup_rate_type_v_4" name="freight_markup_rate_type_4"
                            value="variable">
                        <label for="freight_markup_rate_type_v_4">Multip.</label>
                        <input type="radio" id="freight_markup_rate_type_f_4" name="freight_markup_rate_type_4"
                            value="flat">
                        <label for="freight_markup_rate_type_f_4">Flat</label>
                    </div>
                </div>

                <div class="freight-row" data-index="5">
                    <!-- range 5 -->
                    <input type="number" step="0.01" id="freight_min5" name="freight_min5">
                    <input type="number" step="0.01" id="freight_max5" name="freight_max5">

                    <input type="number" step="0.01" id="freight_rate5" name="freight_rate5">
                    <div>
                        <input type="radio" id="freight_rate_type_5" name="freight_rate_type_5" value="variable">
                        <label for="freight_rate_type_v_5">Variable</label>
                        <input type="radio" id="freight_rate_type_f_5" name="freight_rate_type_5" value="flat">
                        <label for="freight_rate_type_f_5">Flat</label>
                    </div>

                    <input type="number" step="0.01" id="freight_markup_rate5" name="freight_markup_rate5">
                    <div>
                        <input type="radio" id="freight_markup_rate_type_v_5" name="freight_markup_rate_type_5"
                            value="variable">
                        <label for="freight_markup_rate_type_v_5">Multip.</label>
                        <input type="radio" id="freight_markup_rate_type_f_5" name="freight_markup_rate_type_5"
                            value="flat">
                        <label for="freight_markup_rate_type_f_5">Flat</label>
                    </div>
                </div>

                <div class="freight-row" data-index="6">
                    <!-- range 6 -->
                    <input type="number" step="0.01" id="freight_min6" name="freight_min6">
                    <input type="number" step="0.01" id="freight_max6" name="freight_max6">

                    <input type="number" step="0.01" id="freight_rate6" name="freight_rate6">
                    <div>
                        <input type="radio" id="freight_rate_type_6" name="freight_rate_type_6" value="variable">
                        <label for="freight_rate_type_v_6">Variable</label>
                        <input type="radio" id="freight_rate_type_f_6" name="freight_rate_type_6" value="flat">
                        <label for="freight_rate_type_f_6">Flat</label>
                    </div>

                    <input type="number" step="0.01" id="freight_markup_rate6" name="freight_markup_rate6">
                    <div>
                        <input type="radio" id="freight_markup_rate_type_v_6" name="freight_markup_rate_type_6"
                            value="variable">
                        <label for="freight_markup_rate_type_v_6">Multip.</label>
                        <input type="radio" id="freight_markup_rate_type_f_6" name="freight_markup_rate_type_6"
                            value="flat">
                        <label for="freight_markup_rate_type_f_6">Flat</label>
                    </div>
                </div>







            </div>
        </form>
    </div>


    <script src="freight-handler.js"></script>

</body>

</html>
