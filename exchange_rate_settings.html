<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exchange Rates Settings</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Exchange Rates (to CAD) 🌭</h1>

    <div>

        <form id="exchange_rates">
            <button type="button">Load Exchange Rates</button>
            <button type="submit">Save Exchange Rates</button>
            <button type="button">Get Latest Exchange Rates</button>
            <button type="reset">Clear</button><br><br>

            <label>USD <input type="number" step="0.01" id="usd_rate" name="usd_rate"></label><br>
            <label>EUR <input type="number" step="0.01" id="eur_rate" name="eur_rate"></label><br>
            <label>GBP <input type="number" step="0.01" id="gbp_rate" name="gbp_rate"></label><br>
            <label>AUD <input type="number" step="0.01" id="aud_rate" name="aud_rate"></label>
        </form>

    </div>
    </div>
    </div>


    <script src="exchange-handler.js"></script>

</body>

</html>
